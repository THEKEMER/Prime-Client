<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Client | Official Download</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-hover: #27ae60;
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.85);
            --text: #ecf0f1;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Анимированный глубокий фон */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #16a085 0%, #000000 70%);
            z-index: -1;
            opacity: 0.12;
            animation: rotateBg 40s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 500px;
            width: 90%;
            background: var(--card-bg);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 12px;
            font-size: 3.5em;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
        }

        .subtitle {
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85em;
            margin-bottom: 40px;
            display: block;
            font-weight: 600;
        }

        p {
            color: #bdc3c7;
            line-height: 1.8;
            margin-bottom: 45px;
            font-size: 1.1em;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            padding: 22px 55px;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 25px 50px rgba(46, 204, 113, 0.5);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        .info {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 1px;
        }

        .status-dot {
            height: 9px;
            width: 9px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 15px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        b { color: #ffffff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PRIME</h1>
        <span class="subtitle">Next-Gen Minecraft Client</span>
        
        <p>Официальный узел загрузки.<br>Сборка оптимизирована и готова к игре на <b>1.16.5</b>.</p>
        
        <a href="https://github.com/THEKEMER/Prime-Client/releases/download/v1.0/Prime.zip" class="btn">
            СКАЧАТЬ ZIP
        </a>
        
        <div class="info">
            <span class="status-dot"></span> 
            <b>СТАТУС:</b> ONLINE | <b>ВЕРСИЯ:</b> 1.16.5 | <b>STABLE</b>
        </div>
    </div>

</body>
</html>
