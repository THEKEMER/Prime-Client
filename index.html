<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Client | Official Download</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ecf0f1; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Улучшенный анимированный фон */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #16a085 0%, #000000 70%);
            z-index: -1;
            opacity: 0.12;
            animation: rotateBg 30s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container { 
            max-width: 550px; 
            width: 90%;
            background: rgba(15, 15, 15, 0.7); 
            padding: 60px 40px; 
            border-radius: 40px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            border: 1px solid rgba(46, 204, 113, 0.15);
            backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Световой блик на контейнере */
        .container::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(46, 204, 113, 0.05), transparent);
            transform: rotate(45deg);
            pointer-events: none;
        }

        h1 { 
            color: #2ecc71; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 10px;
            font-size: 3.8em;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
        }

        .subtitle {
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85em;
            margin-bottom: 35px;
            display: block;
            font-weight: 600;
        }

        p { 
            color: #bdc3c7; 
            line-height: 1.8; 
            margin-bottom: 50px;
            font-size: 1.1em;
            font-weight: 300;
        }

        .btn { 
            display: inline-block; 
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white; 
            padding: 22px 60px; 
            text-decoration: none; 
            border-radius: 20px; 
            font-weight: 800; 
            font-size: 20px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.25);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .btn:hover { 
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 25px 50px rgba(46, 204, 113, 0.4);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        .info { 
            font-size: 13px; 
            color: #7f8c8d; 
            margin-top: 55px; 
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 1px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 15px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        b { color: #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PRIME</h1>
        <span class="subtitle">Next-Gen Minecraft Client</span>
        <p>Добро пожаловать на официальный узел загрузки.<br>Ваша версия оптимизирована для <b>1.16.5</b>.</p>
        
        <a href="https://github.com/THEKEMER/Prime-Client/releases/download/v1.0/Prime.zip" class="btn">СКАЧАТЬ ZIP</a>
        
        <div class="info">
            <span class="status-dot"></span> 
            <b>СТАТУС:</b> ONLINE | <b>ВЕРСИЯ:</b> 1.16.5 | <b>BUILD:</b> STABLE v1.0
        </div>
    </div>
</body>
</html>
