<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Client | Official Download</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --bg-dark: #050505;
            --container-bg: rgba(15, 15, 15, 0.8);
        }

        body { 
            background-color: var(--bg-dark); 
            color: #ecf0f1; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #16a085 0%, #000000 75%);
            z-index: -1;
            opacity: 0.15;
            animation: rotateBg 40s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container { 
            max-width: 500px; 
            width: 90%;
            background: var(--container-bg); 
            padding: 50px 30px; 
            border-radius: 30px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            border: 1px solid rgba(46, 204, 113, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        h1 { 
            color: var(--primary-color); 
            text-transform: uppercase; 
            letter-spacing: 8px;
            font-size: 3.5em;
            margin: 0;
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }

        .subtitle {
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8em;
            margin-bottom: 30px;
            display: block;
        }

        p { 
            color: #bdc3c7; 
            line-height: 1.6; 
            margin-bottom: 40px;
        }

        .btn { 
            display: inline-block; 
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white; 
            padding: 20px 50px; 
            text-decoration: none; 
            border-radius: 15px; 
            font-weight: 800; 
            font-size: 20px; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
            text-transform: uppercase;
        }

        .btn:hover { 
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.5);
        }

        .info { 
            font-size: 13px; 
            color: #7f8c8d; 
            margin-top: 40px; 
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--primary-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PRIME</h1>
        <span class="subtitle">Next-Gen Minecraft Client</span>
        <p>Нажмите на кнопку ниже, чтобы скачать последнюю версию сборки в формате ZIP.</p>
        
        <a href="https://github.com/THEKEMER/Prime-Client/releases/download/v1.0/Prime.zip" class="btn">
            СКАЧАТЬ ZIP
        </a>
        
        <div class="info">
            <span class="status-dot"></span> 
            <b>СТАТУС:</b> ONLINE | <b>ВЕРСИЯ:</b> 1.16.5
        </div>
    </div>
</body>
</html>
