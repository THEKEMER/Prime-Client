<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Client | Official Download</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #ecf0f1; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Анимированный глубокий фон */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, #16a085 0%, #000000 80%);
            z-index: -1;
            opacity: 0.15;
            animation: moveBg 20s ease-in-out infinite;
        }
        @keyframes moveBg {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(2deg); }
        }
        .container { 
            max-width: 550px; 
            width: 90%;
            background: rgba(20, 20, 20, 0.8); 
            padding: 60px 40px; 
            border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(46, 204, 113, 0.05);
            border: 1px solid rgba(46, 204, 113, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
            position: relative;
        }
        h1 { 
            color: #2ecc71; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            letter-spacing: 6px;
            font-size: 3.2em;
            font-weight: 900;
            text-shadow: 0 0 25px rgba(46, 204, 113, 0.5);
        }
        .subtitle {
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9em;
            margin-bottom: 30px;
            display: block;
        }
        p { 
            color: #bdc3c7; 
            line-height: 1.8; 
            margin-bottom: 45px;
            font-size: 1.15em;
        }
        .btn { 
            display: inline-block; 
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white; 
            padding: 24px 55px; 
            text-decoration: none; 
            border-radius: 16px; 
            font-weight: 800; 
            font-size: 22px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.3);
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }
        .btn:hover { 
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(46, 204, 113, 0.5);
            filter: brightness(1.1);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .info { 
            font-size: 14px; 
            color: #95a5a6; 
            margin-top: 50px; 
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 15px #2ecc71;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 5px #2ecc71; }
            50% { opacity: 0.5; box-shadow: 0 0 20px #2ecc71; }
            100% { opacity: 1; box-shadow: 0 0 5px #2ecc71; }
        }
        b { color: #ecf0f1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PRIME</h1>
        <span class="subtitle">Next-Gen Minecraft Client</span>
        <p>Вы находитесь на официальном узле загрузки.<br>Сборка оптимизирована для версии <b>1.16.5</b>.</p>
        
        <a href="https://github.com/THEKEMER/Prime-Client/releases/download/v1.0/Prime.zip" class="btn">СКАЧАТЬ ZIP</a>
        
        <div class="info">
            <span class="status-dot"></span> 
            <b>Статус:</b> Online | <b>Версия:</b> 1.16.5 | <b>Build:</b> Stable v1.0
        </div>
    </div>
</body>
</html>
